name: CI

# Hosted (GPU-less) CI. What runs here:
#   lint          — ruff / shellcheck / clang-format (static checks only)
#   compile-cuda  — full C++/CUDA compile + link in the NGC TensorRT container,
#                   plus the app --help paths (no CUDA calls executed)
#   python-nogpu  — the pytest subset whose fixtures don't need libdfine/engine/GPU
#   wheel         — builds libdfine.so and packages the dfine wheel artifact
# GPU-dependent behavior (inference, mAP, benchmarks, CUDA graphs, sanitizer
# runs) is NOT verified here — see CONTRIBUTING.md / docs/HANDOFF.md for the
# local validation workflow, and the disabled self-hosted stub at the bottom.

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash  # -eo pipefail for every run step, incl. container jobs

jobs:
  lint:
    name: lint (ruff + shellcheck + clang-format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pinned linters
        # ruff pin matches .pre-commit-config.yaml; clang-format is pinned
        # because formatting output drifts across major versions.
        run: pip install ruff==0.6.9 clang-format==18.1.8

      # python/dfine and python/tests are fully clean — no exclusions there.
      # The per-file ignores carry pre-existing debt only (E401/E702/E731/
      # F401/F541/F841/I001 in trt-files/scripts), scoped per path so any NEW
      # rule or any violation in python/dfine still fails the job.
      - name: ruff
        run: >
          ruff check trt-files/scripts python/dfine python/tests
          --extend-per-file-ignores
          'trt-files/scripts/*:E401,trt-files/scripts/*:E702,trt-files/scripts/*:E731,trt-files/scripts/*:F401,trt-files/scripts/*:F541,trt-files/scripts/*:F841,trt-files/scripts/*:I001'

      - name: shellcheck
        # shellcheck is preinstalled on ubuntu-latest runners.
        run: |
          # Fully clean scripts — no exclusions.
          shellcheck build.sh cmake/cuda_host_ccbin.sh python/build_wheel.sh
          # overnight_bench.sh predates gating: SC2086 ($PY/$SUBSET_ARGS/... rely
          # on intentional word splitting), SC2015 (`A && B || C` used as
          # success/failure logging). Both info-level; excluded for this file only.
          shellcheck --exclude=SC2086,SC2015 trt-files/scripts/overnight_bench.sh

      - name: clang-format --dry-run --Werror
        # Gating. The whole tree is formatted with the repo .clang-format
        # (single-document config, clang-format 18); run `clang-format -i`
        # over changed files before pushing.
        run: |
          git ls-files src include apps examples \
            | grep -E '\.(c|h|cpp|hpp|cu|cuh)$' \
            | xargs -r clang-format --dry-run --Werror

  compile-cuda:
    name: C++/CUDA compile + link (TRT container)
    runs-on: ubuntu-latest
    # nvcr.io/nvidia/tensorrt:24.10-py3 ships nvcc + TensorRT dev headers/libs;
    # compiling and linking needs no GPU. Anonymous pull, but the image is
    # multi-GB — expect a slow first pull on each runner.
    container: nvcr.io/nvidia/tensorrt:24.10-py3
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain deps
        # Mirrors Dockerfile: jammy's apt cmake (3.22) satisfies >=3.20; the
        # system nlohmann/json header keeps CMake off its FetchContent fallback
        # (which would clone from GitHub mid-configure).
        run: |
          apt-get update
          apt-get install -y --no-install-recommends cmake build-essential nlohmann-json3-dev
      - name: Configure
        # CMAKE_CUDA_ARCHITECTURES must be an explicit SM here: build.sh's
        # 'native' default probes a GPU, and there is none on hosted runners.
        # third_party/tensorrt is gitignored (absent from a checkout), so
        # cmake/FindTensorRT.cmake resolves headers AND libs from the
        # container's /usr install — a matched pair, no header/lib skew.
        run: >
          cmake -B build -S .
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc
          -DCUDAToolkit_ROOT=/usr/local/cuda
          -DCMAKE_CUDA_ARCHITECTURES=89
          -DDFINE_WARNINGS_AS_ERRORS=ON
      - name: Build (all targets)
        # No build cache: the image has no ccache, and actions/cache of build/
        # without it does not survive cmake's timestamp checks — omitted.
        run: cmake --build build -j"$(nproc)"
      - name: CPU-only smokes (--help paths)
        # dfine_detect and dfine_bench return 0 from -h/--help before any CUDA
        # or TensorRT API call (apps/dfine_detect.cpp:28, apps/dfine_bench.cpp:247)
        # — this only exercises linking/loading of libdfine + libnvinfer +
        # libcudart. dfine_inspect is deliberately NOT run: it has no --help
        # path (argv[1] is unconditionally an engine path, so "--help" exits
        # nonzero — see apps/dfine_inspect.cpp and the Dockerfile CMD note).
        run: |
          export LD_LIBRARY_PATH="/usr/local/cuda/lib64:${LD_LIBRARY_PATH:-}"
          ./build/dfine_detect --help
          ./build/dfine_bench --help
      - name: ctest (CPU suites; GPU suites skip via 77)
        # image_layout and engine_meta are CPU-only and must PASS here; the
        # shape-transition/recovery suites need a GPU + DFINE_TEST_ENGINE and
        # report SKIP_RETURN_CODE 77 on hosted runners. Building the test
        # binaries without ever running ctest was a v0.3.1-review finding.
        run: |
          export LD_LIBRARY_PATH="/usr/local/cuda/lib64:${LD_LIBRARY_PATH:-}"
          ctest --test-dir build --output-on-failure

  install-consumer:
    name: cmake --install + out-of-tree consumer
    runs-on: ubuntu-latest
    # Same TRT container as compile-cuda: install needs the full link
    # toolchain, and the consumer must resolve TensorRT::TensorRT through the
    # SHIPPED FindTensorRT.cmake, not the checkout's copy.
    container: nvcr.io/nvidia/tensorrt:24.10-py3
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends cmake build-essential nlohmann-json3-dev
      - name: Build + install to a prefix
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc \
            -DCUDAToolkit_ROOT=/usr/local/cuda \
            -DCMAKE_CUDA_ARCHITECTURES=89 \
            -DDFINE_BUILD_APPS=OFF -DDFINE_BUILD_TESTS=OFF
          cmake --build build -j"$(nproc)" --target dfine
          cmake --install build --prefix /tmp/dfine-prefix
      - name: Relocatability audit (installed lib)
        # Same invariant the wheel enforces: no baked RPATH/RUNPATH, no
        # build-machine paths in the dynamic section, SONAME = libdfine.so.1.
        run: |
          lib="$(readlink -f /tmp/dfine-prefix/lib/libdfine.so)"
          readelf -d "$lib" | grep -E 'RPATH|RUNPATH' && exit 1
          readelf -d "$lib" | grep -E '/home/|workspace' && exit 1
          readelf -d "$lib" | grep -q 'SONAME.*libdfine.so.1'
          # The config package must be self-contained: targets + version +
          # the TensorRT find module it depends on.
          for f in dfineConfig.cmake dfineConfigVersion.cmake dfineTargets.cmake FindTensorRT.cmake; do
            test -f "/tmp/dfine-prefix/lib/cmake/dfine/$f"
          done
      - name: Build consumer OUTSIDE the checkout
        # Copy examples/ elsewhere so a leaked build-tree path in the config
        # package cannot be satisfied by the checkout lying around.
        run: |
          cp -r examples /tmp/consumer-src
          cmake -B /tmp/consumer-build -S /tmp/consumer-src/consumer \
            -DCMAKE_PREFIX_PATH=/tmp/dfine-prefix \
            -DCUDAToolkit_ROOT=/usr/local/cuda
          cmake --build /tmp/consumer-build -j"$(nproc)"
      - name: Run consumer (no-args usage path; loads libdfine + TRT)
        run: |
          export LD_LIBRARY_PATH="/tmp/dfine-prefix/lib:/usr/local/cuda/lib64:${LD_LIBRARY_PATH:-}"
          set +e
          /tmp/consumer-build/dfine_consumer
          rc=$?
          set -e
          test "$rc" -eq 2  # usage path: proves the binary loads its deps and runs

  python-nogpu:
    name: python bindings (no-GPU pytest subset)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package + test deps
        # Beyond the dev extra: CPU torch + onnx/onnxruntime so the release-gate
        # suites (strict checkpoint loading, the mandatory ORT N=1/2 dynamic-batch
        # postcondition) actually EXECUTE here instead of importorskip-ping away —
        # a v0.3.1-review finding: CI was green with those gates never run.
        run: |
          pip install -e "python/[dev]"
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install onnx onnxruntime onnxconverter-common
      - name: pytest
        # conftest.py fixtures still skip the GPU-bound subset (libdfine/engine/
        # GPU missing). The CPU subset — CLI cache/export/json suites plus the
        # export safety gates — must pass; the greps reject an all-skipped run
        # AND any skip inside the two release-gate suites.
        run: |
          pytest python/tests -rs | tee pytest-nogpu.log
          grep -qE '[1-9][0-9]* passed' pytest-nogpu.log
          pytest python/tests/test_export_checkpoint.py \
                 python/tests/test_export_postconditions.py -rs | tee pytest-gates.log
          grep -qE '[1-9][0-9]* passed' pytest-gates.log
          ! grep -qE '[1-9][0-9]* skipped' pytest-gates.log

  wheel:
    name: wheel (bundled libdfine.so, linux_x86_64)
    runs-on: ubuntu-latest
    # Independent of compile-cuda: builds only the `dfine` library target in
    # the same TRT container, then packages it.
    container: nvcr.io/nvidia/tensorrt:24.10-py3
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends cmake build-essential nlohmann-json3-dev
      - name: Build libdfine.so
        # sm_89 SASS + compute_89 PTX: runs on Ada as-is and JIT-compiles on
        # newer arches; older GPUs (sm_75/86) need a rebuild with their arch.
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc \
            -DCUDAToolkit_ROOT=/usr/local/cuda \
            -DCMAKE_CUDA_ARCHITECTURES=89 \
            -DDFINE_BUILD_APPS=OFF
          cmake --build build --target dfine -j"$(nproc)"
      - name: Package wheel
        id: package_wheel
        # THE release packaging path (python/build_wheel.sh, SKIP_BUILD reuses
        # the .so built above) — CI must test the same artifact users install,
        # not a hand-rolled approximation. v0.3.0 shipped exactly that bug: the
        # CI wheel silently lacked the bundled build_engine.py.
        run: |
          # wheel >= 0.40 for the `tags` subcommand (the container's wheel predates it)
          python3 -m pip install build 'wheel>=0.40'
          SKIP_BUILD=1 ./python/build_wheel.sh
          version=$(sed -n 's/^version = "\([^"]*\)"$/\1/p' python/pyproject.toml)
          shopt -s nullglob
          wheels=(python/dist/dfine-"$version"-py3-none-linux_*.whl)
          if (( ${#wheels[@]} != 1 )); then
            echo "::error::expected one wheel for dfine $version, found ${#wheels[@]}"
            exit 1
          fi
          printf 'wheel=%s\n' "${wheels[0]}" >> "$GITHUB_OUTPUT"
      - name: Wheel hygiene (contents + relocatable ELF)
        env:
          DFINE_WHEEL: ${{ steps.package_wheel.outputs.wheel }}
        run: |
          unzip -l "$DFINE_WHEEL" | grep -q "dfine/libdfine.so"
          unzip -l "$DFINE_WHEEL" | grep -q "dfine/_scripts/build_engine.py"
          mkdir -p /tmp/whl-audit && unzip -q -o "$DFINE_WHEEL" -d /tmp/whl-audit
          # No RPATH/RUNPATH (a baked build-machine path would hijack TensorRT
          # resolution on any host where it happens to exist) and no absolute
          # build paths anywhere in the dynamic section.
          if readelf -d /tmp/whl-audit/dfine/libdfine.so | grep -E 'RPATH|RUNPATH|/home/'; then
            echo "::error::bundled libdfine.so is not relocatable"; exit 1
          fi
          readelf -d /tmp/whl-audit/dfine/libdfine.so | grep -q 'SONAME.*libdfine.so.1'
      - name: Smoke-install outside the checkout (wheel-only contract)
        # A wheel-only user has no repo: the CLI must still find the bundled
        # engine-build script through its real resolution path. `build --help`
        # is NOT sufficient (argparse exits before script resolution runs).
        env:
          DFINE_WHEEL: ${{ steps.package_wheel.outputs.wheel }}
        run: |
          python3 -m pip install "$DFINE_WHEEL"
          cd /tmp
          python3 - <<'EOF'
          import pathlib
          import dfine
          from dfine.cli import _build_engine_script
          lib = pathlib.Path(dfine.__file__).parent / "libdfine.so"
          assert lib.is_file(), lib
          script = _build_engine_script()
          assert script.is_file() and "_scripts" in str(script), script
          print("wheel-only contract OK:", dfine.__version__, script)
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: dfine-wheel
          path: ${{ steps.package_wheel.outputs.wheel }}
          if-no-files-found: error

